<!DOCTYPE html>

<html lang="en">
<head>
    <title>Contact Me Please!</title>
    <link rel="stylesheet" href="style.css">

<body>

<header>
    <h1>Contact Me</h1>
    <li><a href="index.html">Home</a></li>
<li><a href="Activities.html">Activities</a></li>
<li><a href="contactmepage.html">Contact</a></li>
</header>

<h2>Sign Up & Contact Form</h2>

<form>

    <!-- basic information that is needed-->
     <fieldset>
        <legend> Basic Information</legend>

        <label>Name:</label><br>
        <input type="text" name="Name"><br><br>

        <label>Email: </label><br>
        <input type="text" name="Email"><br><br>

        <label>Password:</label><br>
        <input type="password" name="password"><br><br>
     </fieldset>

     <!--What are your interest-->
     <fieldset>
        <legend> What do you like?</legend>
        <label>Check the boxes in what you are interested in</label>
        <input type="checkbox" name="events"> Events<br>
        <input type="checkbox" name="updates"> Updates<br>
        <input type="checkbox" name="news"> Newsletter<br><br>

       <label> Best way to get in contact with you:</label><br>
       <input type="radio" name="contact"> Email<br>
       <input type="radio" name="contact"> Phone<br><br>

       <label>Reason:</label><br>
       <select>
        <option>Question</option>
        <option>Feedback</option>
        <option>Help</option>
       </select>
     </fieldset>

     <!--messages-->

     <fieldset>
        <legend>Message</legend>

        <label>Type Message: </label><br>
        <textarea rows="4" cols="30"></textarea><br><br>
     </fieldset>

     <input type="submit" value="Submit">

</form>
<footer>
    <p> Due Date: April 30, 2026</p>
</footer>

</body>
</html>
